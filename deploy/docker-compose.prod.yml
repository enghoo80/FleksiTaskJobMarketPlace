services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fleksitask}
      POSTGRES_USER: ${POSTGRES_USER:-fleksi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  backend:
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  frontend-web:
    build:
      args:
        VITE_API_BASE_URL: ${WEB_VITE_API_BASE_URL:-https://api.yourdomain.com}
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped

  admin:
    build:
      args:
        VITE_API_BASE_URL: ${ADMIN_VITE_API_BASE_URL:-https://api.yourdomain.com}
    ports:
      - "127.0.0.1:3001:80"
    restart: unless-stopped