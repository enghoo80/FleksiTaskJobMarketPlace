services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleksitask
      POSTGRES_USER: fleksi
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleksi -d fleksitask"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
