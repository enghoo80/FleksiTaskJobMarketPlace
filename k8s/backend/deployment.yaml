apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fleksitask
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: fleksitask/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fleksitask-backend-config
            - secretRef:
                name: fleksitask-secrets
          volumeMounts:
            - name: media-storage
              mountPath: /app/media
            - name: firebase-credentials
              mountPath: /app/firebase-credentials.json
              subPath: firebase-credentials.json
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-pvc
        - name: firebase-credentials
          secret:
            secretName: firebase-credentials-secret
